<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Changes - pocket-cc</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1e1e2e;--surface:#252536;--surface-hover:#2a2a3d;
  --border:#333346;--border-light:#3e3e56;
  --text:#cdd6f4;--text-bright:#fff;--muted:#6c7086;
  --accent:#c084fc;--accent-dim:rgba(192,132,252,.12);--accent-border:rgba(192,132,252,.25);
  --success:#a6e3a1;--success-bg:rgba(166,227,161,.08);
  --danger:#f38ba8;--warning:#f9e2af;
  --blue:#89b4fa;--blue-bg:rgba(137,180,250,.12);
  --font-sans:-apple-system,system-ui,'Segoe UI','Helvetica Neue',sans-serif;
  --font-mono:'SF Mono',Menlo,'Cascadia Code','JetBrains Mono',Consolas,monospace;
}
[data-theme="light"]{
  --bg:#eff1f5;--surface:#ffffff;--surface-hover:#e6e9ef;
  --border:#ccd0da;--border-light:#bcc0cc;
  --text:#4c4f69;--text-bright:#1e1e2e;--muted:#9ca0b0;
  --accent:#8839ef;--accent-dim:rgba(136,57,239,.08);--accent-border:rgba(136,57,239,.2);
  --success:#40a02b;--success-bg:rgba(64,160,43,.08);
  --danger:#d20f39;--warning:#df8e1d;
  --blue:#1e66f5;--blue-bg:rgba(30,102,245,.06);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.6}
body{display:flex;flex-direction:column}

/* Header */
.header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.header-back{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;color:var(--muted);text-decoration:none;transition:all .1s}
.header-back:hover{color:var(--text);background:var(--surface-hover)}
.header-back svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.header-title{font-size:15px;font-weight:700;color:var(--text-bright)}
.header-spacer{flex:1}
.project-select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:12px;font-family:var(--font-sans);cursor:pointer;min-width:120px}
.project-select:focus{outline:none;border-color:var(--accent-border)}
.header-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s}
.header-btn:hover{color:var(--text);border-color:var(--border-light);background:var(--surface-hover)}
.header-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Content */
.report-list{flex:1;overflow-y:auto;padding:20px 16px;max-width:800px;margin:0 auto;width:100%}
.date-group{margin-bottom:28px}
.date-group-header{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:0 4px 8px;display:flex;align-items:center;gap:8px}
.date-group-header::after{content:'';flex:1;height:1px;background:var(--border)}

/* Cards */
.report-card{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;margin:6px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .12s;text-decoration:none;color:inherit}
.report-card:hover{background:var(--surface-hover);border-color:var(--border-light);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.report-card:active{transform:translateY(0)}
.rc-icon{width:36px;height:36px;border-radius:8px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent)}
.rc-icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.rc-content{flex:1;min-width:0}
.rc-title{font-size:14px;font-weight:600;color:var(--text-bright);line-height:1.4;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.rc-meta{display:flex;flex-wrap:wrap;gap:6px}
.rc-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.rc-badge.project{background:var(--accent-dim);color:var(--accent)}
.rc-badge.branch{background:var(--blue-bg);color:var(--blue)}
.rc-badge.issue{background:var(--surface-hover);color:var(--muted)}
.rc-chevron{color:var(--muted);flex-shrink:0;display:flex;align-items:center}
.rc-chevron svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Empty state */
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:14px;margin-top:4px}
</style>
</head>
<body>
<div class="header">
  <a href="/" class="header-back" title="Back">
    <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
  </a>
  <span class="header-title" data-i18n="cr.title">Changes</span>
  <span class="header-spacer"></span>
  <select class="project-select" id="projectSelect" onchange="onProjectChange()">
    <option value="" data-i18n="cr.allProjects">All Projects</option>
  </select>
  <button class="header-btn" onclick="refresh()" title="Refresh">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
  </button>
  <button class="header-btn" onclick="toggleTheme()" title="Theme">
    <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<div class="report-list" id="reportList">
  <div class="empty-state">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <p data-i18n="cr.loading">Loading...</p>
  </div>
</div>

<script>
let currentProject = ''

function esc(s) {
  const d = document.createElement('div')
  d.textContent = s
  return d.innerHTML
}

async function loadProjects() {
  try {
    const res = await fetch('/api/projects')
    const projects = await res.json()
    const sel = document.getElementById('projectSelect')
    const valid = projects.filter(p => p.localPath !== '__front-desk__')
    for (const p of valid) {
      const opt = document.createElement('option')
      opt.value = p.slug
      opt.textContent = p.slug
      sel.appendChild(opt)
    }
    const saved = localStorage.getItem('changes_project')
    if (saved && valid.some(p => p.slug === saved)) {
      sel.value = saved
      currentProject = saved
    }
  } catch (e) {
    console.error('Failed to load projects:', e)
  }
}

function onProjectChange() {
  const sel = document.getElementById('projectSelect')
  currentProject = sel.value
  localStorage.setItem('changes_project', currentProject)
  refresh()
}

async function refresh() {
  const url = currentProject
    ? `/api/changes?project=${encodeURIComponent(currentProject)}`
    : '/api/changes'
  try {
    const res = await fetch(url)
    const { reports } = await res.json()
    renderReports(reports)
  } catch (e) {
    console.error('Failed to load changes:', e)
    document.getElementById('reportList').innerHTML =
      '<div class="empty-state"><p>Failed to load reports</p></div>'
  }
}

function renderReports(reports) {
  const container = document.getElementById('reportList')
  if (!reports || !reports.length) {
    container.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p data-i18n="cr.noReports">No change reports found</p>
    </div>`
    return
  }

  // Group by date
  const groups = {}
  for (const r of reports) {
    const key = r.date || 'Unknown'
    if (!groups[key]) groups[key] = []
    groups[key].push(r)
  }

  let html = ''
  for (const [date, items] of Object.entries(groups)) {
    html += `<div class="date-group">`
    html += `<div class="date-group-header">${esc(date)}</div>`
    for (const r of items) {
      const href = `/change-report?project=${encodeURIComponent(r.project)}&file=${encodeURIComponent(r.filename)}`
      html += `<a class="report-card" href="${esc(href)}">`
      html += `<div class="rc-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>`
      html += `<div class="rc-content">`
      html += `<div class="rc-title">${esc(r.title)}</div>`
      html += `<div class="rc-meta">`
      html += `<span class="rc-badge project">${esc(r.project)}</span>`
      if (r.branch) html += `<span class="rc-badge branch">${esc(r.branch)}</span>`
      if (r.issue) html += `<span class="rc-badge issue">${esc(r.issue)}</span>`
      html += `</div></div>`
      html += `<div class="rc-chevron"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>`
      html += `</a>`
    }
    html += `</div>`
  }
  container.innerHTML = html
}

function toggleTheme() {
  const html = document.documentElement
  const next = html.getAttribute('data-theme') === 'light' ? '' : 'light'
  if (next) html.setAttribute('data-theme', 'light')
  else html.removeAttribute('data-theme')
  localStorage.setItem('theme', next || 'dark')
}
const saved = localStorage.getItem('theme')
if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light')

loadProjects().then(() => refresh())
</script>
</body>
</html>
