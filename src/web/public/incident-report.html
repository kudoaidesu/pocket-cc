<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Report - pocket-cc</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1e1e2e;--surface:#252536;--surface-hover:#2a2a3d;
  --border:#333346;--border-light:#3e3e56;
  --text:#cdd6f4;--text-bright:#fff;--muted:#6c7086;
  --accent:#c084fc;--accent-dim:rgba(192,132,252,.12);--accent-border:rgba(192,132,252,.25);
  --success:#a6e3a1;--success-bg:rgba(166,227,161,.08);
  --danger:#f38ba8;--danger-bg:rgba(243,139,168,.08);
  --warning:#f9e2af;--warning-bg:rgba(249,226,175,.08);
  --blue:#89b4fa;--blue-bg:rgba(137,180,250,.12);
  --font-sans:-apple-system,system-ui,'Segoe UI','Helvetica Neue',sans-serif;
  --font-mono:'SF Mono',Menlo,'Cascadia Code','JetBrains Mono',Consolas,monospace;
}
[data-theme="light"]{
  --bg:#eff1f5;--surface:#ffffff;--surface-hover:#e6e9ef;
  --border:#ccd0da;--border-light:#bcc0cc;
  --text:#4c4f69;--text-bright:#1e1e2e;--muted:#9ca0b0;
  --accent:#8839ef;--accent-dim:rgba(136,57,239,.08);--accent-border:rgba(136,57,239,.2);
  --success:#40a02b;--success-bg:rgba(64,160,43,.08);
  --danger:#d20f39;--danger-bg:rgba(210,15,57,.06);
  --warning:#df8e1d;--warning-bg:rgba(223,142,29,.08);
  --blue:#1e66f5;--blue-bg:rgba(30,102,245,.06);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.7}

/* Header */
.page-header{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.page-header a{color:var(--accent);text-decoration:none;font-weight:600;font-size:13px}
.page-header a:hover{text-decoration:underline}
.page-header .sep{color:var(--muted);font-size:12px}
.page-header h1{font-size:15px;font-weight:700;color:var(--text-bright);flex:1}
.theme-toggle{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px}
.theme-toggle:hover{color:var(--text);border-color:var(--border-light)}

/* TOC sidebar */
.layout{display:flex;max-width:1200px;margin:0 auto}
.toc{width:220px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;padding:20px 16px;border-right:1px solid var(--border);flex-shrink:0}
.toc a{display:block;padding:4px 8px;color:var(--muted);text-decoration:none;font-size:12px;border-radius:4px;margin-bottom:2px;line-height:1.4}
.toc a:hover{color:var(--text);background:var(--surface-hover)}
.toc a.active{color:var(--accent);background:var(--accent-dim)}
.toc .toc-h2{font-weight:600;color:var(--text);margin-top:8px}

/* Content */
.content{flex:1;padding:32px 40px;max-width:900px;min-width:0}
@media(max-width:768px){
  .toc{display:none}
  .content{padding:20px 16px}
}

/* Meta */
.meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.meta-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
.meta-tag.date{background:var(--blue-bg);color:var(--blue)}
.meta-tag.branch{background:var(--accent-dim);color:var(--accent)}
.meta-tag.status{background:var(--success-bg);color:var(--success)}

/* Title */
h1.title{font-size:22px;font-weight:800;color:var(--text-bright);margin-bottom:8px;line-height:1.3}

/* Sections */
h2{font-size:17px;font-weight:700;color:var(--text-bright);margin:32px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);scroll-margin-top:70px}
h3{font-size:14px;font-weight:700;color:var(--text-bright);margin:20px 0 8px}

/* Tables */
table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
th{text-align:left;padding:8px 12px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
td{padding:8px 12px;border:1px solid var(--border);vertical-align:top}
tr:hover td{background:var(--surface-hover)}

/* TL;DR table */
.tldr-table th{width:120px;background:var(--accent-dim);color:var(--accent)}
.tldr-table td{color:var(--text)}

/* Status badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.done{background:var(--success-bg);color:var(--success)}
.badge.pass{background:var(--success-bg);color:var(--success)}
.badge.fail{background:var(--danger-bg);color:var(--danger)}
.badge.ok{background:var(--success-bg);color:var(--success)}
.badge.new{background:var(--blue-bg);color:var(--blue)}
.badge.mod{background:var(--warning-bg);color:var(--warning)}
.badge.low{background:var(--success-bg);color:var(--success)}

/* Screenshots */
.screenshots{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
@media(max-width:600px){.screenshots{grid-template-columns:1fr}}
.screenshot-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface)}
.screenshot-card img{width:100%;height:auto;display:block;cursor:pointer;transition:transform .2s}
.screenshot-card img:hover{transform:scale(1.02)}
.screenshot-card .label{padding:8px 12px;font-size:12px;font-weight:600;text-align:center;border-top:1px solid var(--border)}
.screenshot-card .label.before{color:var(--danger)}
.screenshot-card .label.after{color:var(--success)}

/* Code */
code{background:var(--surface);padding:1px 5px;border-radius:3px;font-family:var(--font-mono);font-size:12px;color:var(--accent)}

/* Evidence list */
.evidence{margin:12px 0;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.evidence p{margin:4px 0}
.evidence strong{color:var(--text-bright)}

/* Checklist */
.checklist{list-style:none;margin:12px 0}
.checklist li{padding:4px 0;display:flex;align-items:center;gap:8px;font-size:13px}
.checklist .check{width:16px;height:16px;border-radius:4px;background:var(--success-bg);color:var(--success);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.checklist .uncheck{width:16px;height:16px;border-radius:4px;background:var(--surface);border:1px solid var(--border);flex-shrink:0}

/* Impact badge */
.impact{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;background:var(--success-bg);border:1px solid rgba(166,227,161,.15);color:var(--success);font-weight:600;font-size:12px;margin-top:8px}

/* Fullscreen overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;cursor:pointer;align-items:center;justify-content:center}
.overlay.open{display:flex}
.overlay img{max-width:95%;max-height:95%;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}

/* Summary bar */
.summary-bar{display:flex;gap:12px;flex-wrap:wrap;margin:16px 0;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.summary-item{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:80px}
.summary-item .num{font-size:22px;font-weight:800;color:var(--text-bright)}
.summary-item .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
</style>
</head>
<body>
<div class="page-header">
  <a href="/">pocket-cc</a>
  <span class="sep">/</span>
  <h1>Incident Report</h1>
  <button class="theme-toggle" onclick="DocViewer.toggleTheme()">Theme</button>
</div>
<div class="layout">
  <nav class="toc" id="toc"></nav>
  <main class="content">
    <p style="color:var(--muted)">Select a report from the list.</p>
  </main>
</div>
<div class="overlay" id="overlay">
  <img id="overlayImg" src="" alt="">
</div>
<script src="/doc-viewer.js"></script>
<script>
DocViewer.initTheme()
DocViewer.initOverlay()
DocViewer.loadDynamic('incidents', '/incidents', 'Incidents')
DocViewer.initTocTracking()
</script>
</body>
</html>
